<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Funcionário - Campos Obrigatórios</title>
</head>
<body>

    <header>
        <h1>Ficha de Cadastro de Funcionário</h1>
        <small>Campos marcados com (*) são obrigatórios.</small>
    </header>

    <form action="#" method="post">
        
        <fieldset>
            <legend>Dados Pessoais</legend>
            
            <div>
                <label for="nome">Nome Completo (*):</label><br>
                <input type="text" id="nome" name="nome" size="60" required>
            </div>

            <div>
                <label for="cpf">CPF (*):</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                
                <label for="rg">RG:</label>
                <input type="text" id="rg" name="rg">
                
                <label for="data_nasc">Data de Nascimento (*):</label>
                <input type="date" id="data_nasc" name="data_nasc" required>
            </div>

            <div>
                <label for="pai">Nome do Pai:</label><br>
                <input type="text" id="pai" name="pai" size="60">
            </div>

            <div>
                <label for="mae">Nome da Mãe:</label><br>
                <input type="text" id="mae" name="mae" size="60">
            </div>
        </fieldset>

        <fieldset>
            <legend>Documentação e Contato</legend>
            
            <div>
                <label for="pis">PIS:</label>
                <input type="text" id="pis" name="pis">
                
                <label for="ctps">Carteira de Trabalho:</label>
                <input type="text" id="ctps" name="ctps">
            </div>

            <div>
                <label for="email">E-mail (*):</label>
                <input type="email" id="email" name="email" size="40" required>
                
                <label for="tel">Telefone:</label>
                <input type="tel" id="tel" name="tel">
            </div>
        </fieldset>

        <fieldset>
            <legend>Endereço</legend>
            
            <div>
                <label for="endereco">Rua/Logradouro:</label><br>
                <input type="text" id="endereco" name="endereco" size="60">
            </div>

            <div>
                <label for="bairro">Bairro:</label>
                <input type="text" id="bairro" name="bairro">
                
                <label for="cidade">Cidade:</label>
                <input type="text" id="cidade" name="cidade">
                
                <label for="uf">UF:</label>
                <select id="uf" name="uf">
                    <option value="">Selecione</option>
                    <option value="AC">AC</option><option value="AL">AL</option><option value="AP">AP</option>
                    <option value="AM">AM</option><option value="BA">BA</option><option value="CE">CE</option>
                    <option value="DF">DF</option><option value="ES">ES</option><option value="GO">GO</option>
                    <option value="MA">MA</option><option value="MT">MT</option><option value="MS">MS</option>
                    <option value="MG">MG</option><option value="PA">PA</option><option value="PB">PB</option>
                    <option value="PR">PR</option><option value="PE">PE</option><option value="PI">PI</option>
                    <option value="RJ">RJ</option><option value="RN">RN</option><option value="RS">RS</option>
                    <option value="RO">RO</option><option value="RR">RR</option><option value="SC">SC</option>
                    <option value="SP">SP</option><option value="SE">SE</option><option value="TO">TO</option>
                </select>
            </div>
        </fieldset>

        <fieldset>
            <legend>Informações da Empresa</legend>
            
            <div>
                <label for="admissao">Data de Admissão (*):</label>
                <input type="date" id="admissao" name="admissao" required>
                
                <label for="cargo">Cargo (*):</label>
                <input type="text" id="cargo" name="cargo" required>
            </div>

            <div>
                <label for="obs">Observações:</label><br>
                <textarea id="obs" name="obs" rows="4" cols="50"></textarea>
            </div>
        </fieldset>

        

        <div>
            <button type="submit">Enviar Cadastro</button>
            <button type="reset">Limpar Formulário</button>
        </div>

    </form>

</body>
</html>

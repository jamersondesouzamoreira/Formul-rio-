<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Funcionário Simples</title>
</head>
<body>

    <h1>Ficha de Cadastro de Funcionário</h1>

    <form action="#" method="post">
        
        <fieldset>
            <legend>Dados Pessoais</legend>
            <p>
                Nome Completo: <br>
                <input type="text" name="nome" size="60">
            </p>
            <p>
                CPF: <input type="text" name="cpf"> 
                RG: <input type="text" name="rg">
                Data de Nasc.: <input type="date" name="data_nasc">
            </p>
            <p>
                Pai: <br>
                <input type="text" name="pai" size="60">
            </p>
            <p>
                Mãe: <br>
                <input type="text" name="mae" size="60">
            </p>
        </fieldset>

        <fieldset>
            <legend>Documentação e Contato</legend>
            <p>
                PIS: <input type="text" name="pis">
                Carteira de Trabalho: <input type="text" name="ctps">
            </p>
            <p>
                E-mail: <input type="email" name="email" size="40">
                Telefone: <input type="tel" name="tel">
            </p>
        </fieldset>

        <fieldset>
            <legend>Endereço</legend>
            <p>
                Rua/Logradouro: <br>
                <input type="text" name="endereco" size="60">
            </p>
            <p>
                Bairro: <input type="text" name="bairro">
                Cidade: <input type="text" name="cidade">
                UF: <input type="text" name="uf" size="2">
            </p>
        </fieldset>

        <fieldset>
            <legend>Informações da Empresa</legend>
            <p>
                Data de Admissão: <input type="date" name="admissao">
                Cargo: <input type="text" name="cargo">
            </p>
            <p>
                Observações:<br>
                <textarea name="obs" rows="4" cols="50"></textarea>
            </p>
        </fieldset>

        <br>
        <button type="submit">Enviar Cadastro</button>
        <button type="reset">Limpar Formulário</button>

    </form>

</body>
</html>
